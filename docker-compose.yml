x-kanbancw-config: &kanbancw-config
  KANBANCW_DOMAIN: ${KANBANCW_DOMAIN}
  CHATWOOT_DOMAIN: ${CHATWOOT_DOMAIN}
  CHATWOOT_DATABASE_URL: ${CHATWOOT_DATABASE_URL}

services:
  postgres-kanban:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kanbancw
      POSTGRES_USER: kanbancw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kanbancw-postgres:/var/lib/postgresql/data
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis-kanban:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - kanbancw-redis:/data
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  backend:
    image: luantuyster/starflow-veiculos-backend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://kanbancw:${POSTGRES_PASSWORD}@postgres-kanban:5432/kanbancw?schema=public
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis-kanban
      REDIS_PORT: 6379
      CORS_ORIGIN: "*"
      DISABLE_AUTH: "true"
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-}
      <<: *kanbancw-config
    volumes:
      - kanbancw-uploads:/app/uploads
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.gv-backend.rule=Host(`${KANBANCW_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/health`) || PathPrefix(`/socket.io`) || PathPrefix(`/dashboard-script`) || PathPrefix(`/uploads`))"
        - "traefik.http.routers.gv-backend.entrypoints=websecure"
        - "traefik.http.routers.gv-backend.tls=true"
        - "traefik.http.routers.gv-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gv-backend.priority=100"
        - "traefik.http.services.gv-backend.loadbalancer.server.port=3000"
        - "traefik.docker.network=network_swarm_public"

  frontend:
    image: luantuyster/starflow-veiculos-frontend:latest
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.gv-frontend.rule=Host(`${KANBANCW_DOMAIN}`)"
        - "traefik.http.routers.gv-frontend.entrypoints=websecure"
        - "traefik.http.routers.gv-frontend.tls=true"
        - "traefik.http.routers.gv-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gv-frontend.loadbalancer.server.port=80"
        - "traefik.docker.network=network_swarm_public"
        - "traefik.http.routers.gv-frontend.priority=1"

volumes:
  kanbancw-postgres:
    external: true
    name: kanbancw-postgres
  kanbancw-uploads:
    external: true
    name: kanbancw-uploads
  kanbancw-redis:
    external: true
    name: kanbancw-redis

networks:
  network_swarm_public:
    external: true
