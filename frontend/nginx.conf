server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    # NOTE: X-Frame-Options is intentionally omitted — this SPA runs inside
    # a Chatwoot iframe. frame-ancestors in CSP is the modern equivalent.
    add_header X-Content-Type-Options  "nosniff";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # Allow embedding from any origin (Chatwoot iframe support)
    add_header Content-Security-Policy "frame-ancestors *;";

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;
}
